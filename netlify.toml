[build]
  command = "npm run build"
  publish = "dist/client"

[functions]
  directory = ".netlify/v1/functions"

# Serve static assets directly (don't redirect to function)
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = false

# Serve any other static file directly if it exists
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  force = false
  condition = "File"

# Everything else goes to the SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true